# AI Gateway Configuration
# ========================
# This file controls provider routing, fallback chains, and feature flags.

providers:
  openai:
    api_key_env: OPENAI_API_KEY
    models:
      - gpt-4o
      - gpt-4o-mini
      - gpt-3.5-turbo
      - gpt-4
      - gpt-4-turbo
    enabled: true

  anthropic:
    api_key_env: ANTHROPIC_API_KEY
    models:
      - claude-sonnet-4
      - claude-haiku-4
    enabled: true

  google:
    api_key_env: GOOGLE_API_KEY
    models:
      - gemini-2.0-flash
      - gemini-2.5-pro
    enabled: true

routing:
  default_model: gpt-4o-mini
  fallback_chain:
    - openai
    - anthropic
    - google
  retry:
    max_attempts: 3
    backoff_base_seconds: 1.0

cache:
  enabled: true
  ttl_seconds: 3600
