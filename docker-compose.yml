version: "3.9"

services:
  # ── FastAPI Backend ──────────────────────────────────────────────
  backend:
    build: .
    container_name: ai-gateway-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./gateway_config.yaml:/app/gateway_config.yaml:ro
      - db-data:/app/data
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── React Dashboard ─────────────────────────────────────────────
  dashboard:
    build: ./dashboard
    container_name: ai-gateway-dashboard
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  # ── Redis (cache + rate limiting) ───────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ai-gateway-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  db-data:
  redis-data:
